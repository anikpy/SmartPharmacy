{% extends 'base.html' %}

{% block title %}Profile - Smart Pharmacy{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-lg shadow-md p-8">
    <h1 class="text-2xl font-bold text-blue-600 mb-6">Profile</h1>
    
    <div class="space-y-4">
        <div>
            <label class="block text-gray-700 font-semibold">Username</label>
            <p class="text-gray-900">{{ user.username }}</p>
        </div>
        <div>
            <label class="block text-gray-700 font-semibold">Email</label>
            <p class="text-gray-900">{{ user.email }}</p>
        </div>
        <div>
            <label class="block text-gray-700 font-semibold">Role</label>
            <p class="text-gray-900">{{ user.get_role_display }}</p>
        </div>
        {% if user.shop %}
        <div>
            <label class="block text-gray-700 font-semibold">Shop</label>
            <p class="text-gray-900">{{ user.shop.name }}</p>
        </div>
        {% endif %}
        <div>
            <label class="block text-gray-700 font-semibold">Phone</label>
            <p class="text-gray-900">{{ user.phone|default:"Not provided" }}</p>
        </div>
    </div>
</div>
{% endblock %}
